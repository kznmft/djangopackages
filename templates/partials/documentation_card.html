{% load i18n %}
<div class="card-header">
    <div class="flex items-center justify-between">
        <h3 class="flex items-center gap-2 text-lg font-semibold">
            <i class="ph-bold ph-book-open text-xl"></i>
            {% translate "Documentation" %}
        </h3>
        {% if request.user.is_authenticated and request.user.profile.can_edit_package %}
            <button
                hx-get="{% url 'edit_documentation' package.slug %}"
                hx-target="#documentation-card"
                hx-swap="innerHTML"
                hx-indicator="#documentation-spinner"
                onclick="document.getElementById('documentation-card').originalContent = document.getElementById('documentation-card').innerHTML"
                class="btn-secondary h-8 px-2 text-xs"
                title="{% translate 'Edit documentation' %}"
            >
                <i class="ph-bold ph-pencil-simple text-base"></i>
            </button>
        {% endif %}
    </div>
</div>
<div class="card-content">
    {% if package.documentation_url %}
        <a href="{{ package.documentation_url }}" target="_blank" rel="noopener noreferrer" class="text-primary flex items-center gap-1 text-sm break-all hover:underline">
            <span class="truncate">{{ package.documentation_url }}</span>
            <i class="ph-bold ph-arrow-square-out flex-shrink-0 text-sm"></i>
        </a>
    {% else %}
        <p class="text-muted-foreground text-sm">{% translate "No documentation URL provided." %}</p>
    {% endif %}
</div>
