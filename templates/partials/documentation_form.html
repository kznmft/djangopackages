{% load i18n %}
<div class="card-header">
    <h3 class="flex items-center gap-2 text-lg font-semibold">
        <i class="ph-bold ph-book-open text-xl"></i>
        {% translate "Edit Documentation" %}
    </h3>
</div>
<div class="card-content">
    <form hx-post="{% url 'edit_documentation' package.slug %}" hx-target="#documentation-card" hx-swap="innerHTML" hx-indicator="#documentation-spinner">
        {% csrf_token %}
        {% include "partials/form_renderer.html" %}
        <div class="mt-4 flex justify-end gap-2">
            <button
                type="button"
                class="btn btn-secondary"
                onclick="const card = document.getElementById('documentation-card'); card.innerHTML = card.originalContent; htmx.process(card);"
            >{% translate "Cancel" %}</button>
            <button type="submit" class="btn btn-primary">{% translate "Save" %}</button>
        </div>
    </form>
</div>
